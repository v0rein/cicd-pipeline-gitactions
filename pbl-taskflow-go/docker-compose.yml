version: '3.9'

services:

  # ── Database ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_DB:       taskflow
      POSTGRES_USER:     taskflow
      POSTGRES_PASSWORD: taskflow_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d   # ← auto-run migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow -d taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Aplikasi ────────────────────────────────────────────────────────────────
  app:
    build: .
    container_name: taskflow-api
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://taskflow:taskflow_secret@postgres:5432/taskflow?sslmode=disable
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
